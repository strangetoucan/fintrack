[pytest]
testpaths = tests
addopts =
    -v
    --tb=short
    --strict-markers
    --junit-xml=reports/junit-backend.xml
    --cov=.
    --cov-report=xml:reports/coverage-backend.xml
    --cov-report=term-missing
    --cov-omit=tests/*,seed.py,.venv/*,conftest.py
markers =
    integration: requires a running MySQL instance (deselect with -m "not integration")
