# TEMPLATE — do NOT commit real credentials.
# Apply manually or via a secrets manager (e.g. Sealed Secrets, Vault).
#
# The <app-password> here must match MYSQL_PASSWORD in finance-mysql-secret.
#
# IMPORTANT: If the password contains special characters (e.g. @ # % & +),
# URL-encode them before placing in the DATABASE_URL:
#   @  →  %40
#   #  →  %23
#   %  →  %25
#   &  →  %26
#   +  →  %2B
#
# Create with:
#   kubectl create secret generic finance-backend-secret \
#     --namespace=finance \
#     --from-literal=DATABASE_URL='mysql+pymysql://finance:<app-password>@finance-mysql:3306/finance_budgeter' \
#     --from-literal=ALLOWED_ORIGINS='https://finance.home.strtoucane.me'
#
apiVersion: v1
kind: Secret
metadata:
  name: finance-backend-secret
  namespace: finance
type: Opaque
stringData:
  DATABASE_URL: "mysql+pymysql://finance:<app-password>@finance-mysql:3306/finance_budgeter"
  ALLOWED_ORIGINS: "https://finance.home.strtoucane.me"
