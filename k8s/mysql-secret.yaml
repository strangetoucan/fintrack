# TEMPLATE — do NOT commit real credentials.
# Create manually on the cluster before first deploy:
#
#   kubectl create secret generic finance-mysql-secret \
#     --namespace=finance \
#     --from-literal=MYSQL_ROOT_PASSWORD='<root-password>' \
#     --from-literal=MYSQL_PASSWORD='<app-password>'
#
# The same MYSQL_PASSWORD value must also appear in the DATABASE_URL
# inside the finance-backend-secret (see backend-secret.yaml).
apiVersion: v1
kind: Secret
metadata:
  name: finance-mysql-secret
  namespace: finance
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "<root-password>"
  MYSQL_PASSWORD: "<app-password>"
